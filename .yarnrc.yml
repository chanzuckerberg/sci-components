nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.1.0.cjs

# story-utils peers @storybook/react <9 but is only used for generateSnapshots in Vitest.
# Mark the peer optional so Yarn doesn't warn; @storybook/react-vite already pulls it in.
packageExtensions:
  "@chanzuckerberg/story-utils@*":
    peerDependenciesMeta:
      "@storybook/react":
        optional: true
